<!doctype html>
<html class="no-js" lang="">

<head>
    <link rel="stylesheet" href="site/css/normalize.css">
    <link rel="stylesheet" href="site/css/main.css">
    <link rel="stylesheet" href="sit/css/animate.min.css">
    <link rel="stylesheet" href="site/css/bootstrap.min.css">
    <link rel="stylesheet" href="site/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="sitecss/star-animation.css">
    <link rel="stylesheet" href="site/style.css">
    <script src="site/js/modernizr-3.6.0.min.js"></script>
</head>

<body>
    <div id="wrapper" class="wrapper">
        <div class="fxt-template-default fxt-template-layout4" data-bg-image="site/img/bg5.jpg"></div>
        <!-- Content Wrap Start Here -->
        <div class="fxt-content-wrap-layout4">
            <!-- Star Animation Start Here -->
            <div class="star-animation">
                <div id="stars"></div>
                <div id="stars2"></div>
                <div id="stars3"></div>
                <div id="stars4"></div>
                <div id="stars5"></div>
            </div>
            <!-- Star Animation End Here -->
            <!-- Logo Area Start Here -->
            <div class="fxt-logo fxt-logo-layout4 fxt-absolute-box fxt-box-top-left">
                <div class="fxt-transformX-100 fxt-transition-delay-2">
                    <img src="site/img/logo-2.png" alt="logo">
                </div>
            </div>
            <!-- Logo Area End Here -->
            <!-- Page Content Area Start Here -->
            <div class="fxt-content-box fxt-content-box-layout4">
                <h1 class="fxt-item-title fxt-transformY-100 fxt-transition-delay-10">COMING SOON</h1>
                <div class="countdown-layout1 fxt-transformY-100 fxt-transition-delay-15">
                    <div class="countdown"></div>
                </div>
            </div>
            <!-- Page Content Area End Here -->
            <!-- Action Item Area End Here -->
            
            <!-- Action Item Area End Here -->
            <!-- Social Area Start Here -->
            <div class="fxt-social fxt-social-layout4 fxt-absolute-box fxt-box-bottom-center">
                <ul class="fxt-social-items fxt-items-light">
                    <li class="fxt-twitter fxt-transformX--100 fxt-transition-delay-17"><a href="#" title="Invite"><i class="fas fa-download"></i></a></li>
                    <li class="fxt-facebook fxt-transformX--100 fxt-transition-delay-18"><a href="#" title="Support server"><i class="fab fa-discord"></i></a></li>
                    
                </ul>
            </div>
            <!-- Social Area End Here -->
            <!-- Modal Area Start Here -->
            <div class="modal fade" id="exampleModalCenter" tabindex="-1" role="dialog" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Modal Area End Here -->
        </div>
        <!-- Content Wrap End Here -->
    </div>
   
    <script src="site/js/jquery-3.3.1.min.js"></script>    
    <script src="site/js/popper.min.js"></script>
    <script src="site/js/bootstrap.min.js"></script>
    <script src="site/js/jquery.countdown.min.js"></script>
    <script src="site/js/pace.min.js"></script>
    <script src="site/js/main.js"></script>

</body>

</html>
